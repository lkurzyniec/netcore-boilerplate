---
name: Scanners

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'

  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'

  workflow_dispatch:

  schedule:
    - cron: '0 5 * * Mon'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  trivy-scan:
    name: Trivy scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Build
        run: dotnet build -c Release ./src/HappyCode.NetCoreBoilerplate.Api/HappyCode.NetCoreBoilerplate.Api.csproj

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: v0.70.0

      - name: Run Trivy scanner (table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          trivy-config: trivy.yml
          skip-setup-trivy: true

      - name: Run Trivy scanner (sarif)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: ${{ github.ref == 'refs/heads/master' }}
        with:
          scan-type: fs
          trivy-config: trivy.yml
          skip-setup-trivy: true

          format: sarif
          output: trivy-results.sarif
          exit-code: 1

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          sarif_file: trivy-results.sarif
          category: trivy-results

  trivy-scan-image:
    name: Trivy scan (image)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: v0.70.0

      - name: Run Trivy scanner (table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: lkurzyniec/netcore-boilerplate
          trivy-config: trivy.yml
          skip-setup-trivy: true

      - name: Run Trivy scanner (sarif)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: ${{ github.ref == 'refs/heads/master' }}
        with:
          image-ref: lkurzyniec/netcore-boilerplate
          trivy-config: trivy.yml
          skip-setup-trivy: true

          format: sarif
          output: trivy-results.sarif
          exit-code: 1

      - name: Create issue
        if: ${{ github.ref == 'refs/heads/master' }}
        run: |
          jq -r '.runs[].results[] | [.ruleId, .message.text] | @tsv' trivy-results.sarif |
          while read -r id msg; do
            exists=$(gh issue list --search "$id in:title" --state all --json number --jq 'length')
            echo "Issue: $id, found result: $exists"

            if [ "$exists" -eq 0 ]; then
              body=$(printf "%b \n\n --- \n\n Workflow run: %s/%s/actions/runs/%s" \
                    "$msg" "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}")
              gh issue create --title "$id" --body "$body" --label "cve"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          sarif_file: trivy-results.sarif
          category: trivy-results
